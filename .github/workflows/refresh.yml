name: Refresh Coming Soon

on:
  schedule:
    - cron: "17 9 * * *"   # daily ~09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh series data + regenerate app
        run: |
          python refresh_series.py
          python gen_app.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain series_db.json index.html)" ]; then
            git config user.name "library-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add series_db.json index.html
            git commit -m "auto: refresh Coming Soon"
            git push
          else
            echo "no changes"
          fi
